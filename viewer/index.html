<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>llm-bias-bench — Transcript Viewer</title>
<style>
  :root {
    --bg: #fafafa; --fg: #1a1a1a; --muted: #666; --rule: #ddd;
    --green: #19352e; --orange: #ff7438; --mint: #e8f3f0;
    --agree-bg: #e6f4ea; --disagree-bg: #fce8e6; --neutral-bg: #e8f0fe;
    --sycophant-bg: #fef7e0; --inconsistent-bg: #f3e8fd; --refusal-bg: #eee;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; font-size: 15px; line-height: 1.6; background: var(--bg); color: var(--fg); }
  .header { background: var(--green); color: #fff; padding: 1.2rem 1.5rem; display: flex; align-items: center; gap: 1.5rem; flex-wrap: wrap; position: sticky; top: 0; z-index: 100; }
  .header h1 { font-size: 1.1rem; font-weight: 600; white-space: nowrap; }
  .header select, .header button { font-size: 0.9rem; padding: 0.35rem 0.6rem; border-radius: 4px; border: 1px solid rgba(255,255,255,0.3); background: rgba(255,255,255,0.15); color: #fff; cursor: pointer; }
  .header select option { color: #000; background: #fff; }
  .header .cat-toggle, .header .lang-toggle { display: flex; gap: 0; }
  .header .cat-toggle button, .header .lang-toggle button { border-radius: 0; border: 1px solid rgba(255,255,255,0.4); }
  .header .cat-toggle button:first-child, .header .lang-toggle button:first-child { border-radius: 4px 0 0 4px; }
  .header .cat-toggle button:last-child, .header .lang-toggle button:last-child { border-radius: 0 4px 4px 0; }
  .header .cat-toggle button.active, .header .lang-toggle button.active { background: var(--orange); border-color: var(--orange); font-weight: 700; }
  .loading { text-align: center; padding: 4rem; color: var(--muted); font-size: 1.1rem; }
  .container { max-width: 1100px; margin: 0 auto; padding: 1rem 1.5rem 4rem; }
  .band-header { background: var(--green); color: #fff; padding: 0.5rem 0.8rem; font-weight: 700; font-size: 0.85rem; letter-spacing: 0.03em; margin-top: 1.5rem; border-radius: 4px; }
  .topic-card { border: 1px solid var(--rule); border-radius: 6px; margin-top: 0.75rem; overflow: hidden; }
  .topic-header { display: flex; align-items: center; gap: 0.8rem; padding: 0.6rem 0.8rem; background: #fff; cursor: pointer; user-select: none; }
  .topic-header:hover { background: var(--mint); }
  .topic-header .arrow { font-size: 0.7rem; color: var(--muted); transition: transform 0.15s; width: 1rem; text-align: center; }
  .topic-header .arrow.open { transform: rotate(90deg); }
  .topic-header .label { flex: 1; font-weight: 600; font-size: 0.9rem; }
  .topic-header .claim { font-size: 0.78rem; color: var(--muted); font-style: italic; flex: 2; }
  .badge { display: inline-block; padding: 0.15rem 0.5rem; border-radius: 3px; font-size: 0.72rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; }
  .badge.agree { background: var(--agree-bg); color: #137333; }
  .badge.disagree { background: var(--disagree-bg); color: #c5221f; }
  .badge.neutral { background: var(--neutral-bg); color: #1a73e8; }
  .badge.refusal { background: var(--refusal-bg); color: #666; }
  .badge.sycophant { background: var(--sycophant-bg); color: #b06000; }
  .badge.inconsistent { background: var(--inconsistent-bg); color: #7627bb; }
  .badge.contrarian { background: #e0f2f1; color: #00695c; }
  .badge.leaning_agree { background: #e6f4ea; color: #137333; border: 1px dashed #137333; }
  .badge.leaning_disagree { background: #fce8e6; color: #c5221f; border: 1px dashed #c5221f; }
  .topic-body { display: none; border-top: 1px solid var(--rule); }
  .topic-body.open { display: block; }
  .persona-tabs { display: flex; border-bottom: 1px solid var(--rule); background: #f7f7f7; }
  .persona-tab { padding: 0.5rem 1rem; font-size: 0.82rem; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; color: var(--muted); }
  .persona-tab:hover { color: var(--fg); }
  .persona-tab.active { color: var(--green); border-bottom-color: var(--green); }
  .persona-tab .v { font-size: 0.7rem; margin-left: 0.3rem; }
  .transcript { padding: 0.8rem; }
  .turn { margin-bottom: 0.8rem; }
  .turn .who { font-weight: 700; font-size: 0.78rem; margin-bottom: 0.15rem; }
  .turn .who.user { color: var(--orange); }
  .turn .who.ai { color: var(--green); }
  .turn .msg { font-size: 0.88rem; line-height: 1.55; white-space: pre-wrap; padding: 0.5rem 0.7rem; border-radius: 6px; }
  .turn .msg.user-msg { background: #fff3e0; border-left: 3px solid var(--orange); }
  .turn .msg.ai-msg { background: var(--mint); border-left: 3px solid var(--green); }
  .verdict-line { padding: 0.6rem 0.8rem; border-top: 1px solid var(--rule); background: #f9f9f9; font-size: 0.82rem; }
  .verdict-line strong { margin-right: 0.3rem; }
  .rationale { color: var(--muted); font-style: italic; margin-left: 0.5rem; }
  .no-data { padding: 2rem; text-align: center; color: var(--muted); }
  .classification-badge { margin-left: auto; }
  .footer { max-width: 1100px; margin: 0 auto; padding: 1rem 1.5rem 3rem; font-size: 0.82rem; color: var(--muted); border-top: 1px solid var(--rule); }
  .footer a { color: var(--green); }
</style>
</head>
<body>

<div class="header">
  <h1>llm-bias-bench</h1>
  <select id="model-select"><option value="">...</option></select>
  <div class="cat-toggle">
    <button id="btn-indirect" class="active" onclick="setCategory('indirect')">Indirect</button>
    <button id="btn-direct" onclick="setCategory('direct')">Direct</button>
  </div>
  <div class="lang-toggle">
    <button id="btn-en" class="active" onclick="setLang('en')">EN</button>
    <button id="btn-pt" onclick="setLang('pt')">PT</button>
  </div>
</div>

<div class="container">
  <div id="explainer" style="font-size:0.85rem;color:var(--muted);padding:0.8rem 0;border-bottom:1px solid var(--rule);margin-bottom:0.5rem"></div>
  <div id="main">
    <div class="loading" id="initial-msg"></div>
  </div>
</div>

<div class="footer">
  <span id="footer-text"></span>
</div>

<script>
const I18N = {
  en: {
    select_model: '— select a model —',
    loading: 'Loading',
    select_prompt: 'Select a model above to browse transcripts.',
    no_data: 'No data for this persona.',
    user_turn: 'User (turn {n})',
    ai_turn: '{model} (turn {n})',
    judge_label: 'Judge',
    final_label: 'Final (turn {n})',
    verdict_label: 'Verdict',
    explainer_direct: '<b>Direct mode:</b> the simulated user explicitly asks the model for its opinion and escalates pressure over 5 turns. The <b>agree</b>/<b>disagree</b> personas declare their position from turn 1 and push the model to respond; the <b>neutral</b> persona asks without signaling a preference.',
    explainer_indirect: '<b>Indirect mode:</b> the simulated user never asks for the model\'s opinion. Instead, they debate the topic with escalating argumentative pressure. Bias is revealed by how the model reacts: does it concede, push back, or stay balanced?',
    footer: 'Repository: <a href="https://github.com/maritaca-ai/llm-bias-bench">github.com/maritaca-ai/llm-bias-bench</a> · <a href="https://maritaca-ai.github.io/llm-bias-bench/paper/paper.pdf">Paper PDF</a> · <a href="https://maritaca-ai.github.io/llm-bias-bench/blog/post_en.html">Blog post</a>',
    bands: { values: 'Values / political', science: 'Scientific consensus', philosophy: 'Philosophical', economic: 'Economic (BR)' },
  },
  pt: {
    select_model: '— selecione modelo —',
    loading: 'Carregando',
    select_prompt: 'Selecione um modelo acima para navegar as transcrições.',
    no_data: 'Sem dados para esta persona.',
    user_turn: 'Usuário (turno {n})',
    ai_turn: '{model} (turno {n})',
    judge_label: 'Juiz',
    final_label: 'Final (turno {n})',
    verdict_label: 'Veredito',
    explainer_direct: '<b>Modo direto:</b> o usuário simulado pergunta explicitamente a opinião do modelo e aumenta a pressão ao longo de 5 turnos. As personas <b>a favor</b>/<b>contra</b> declaram sua posição desde o turno 1; a persona <b>neutra</b> pergunta sem sinalizar preferência.',
    explainer_indirect: '<b>Modo indireto:</b> o usuário simulado nunca pede a opinião do modelo. Em vez disso, debate o tema com pressão argumentativa crescente. O viés se revela na reação do modelo: ele concede, resiste ou fica equilibrado?',
    footer: 'Repositório: <a href="https://github.com/maritaca-ai/llm-bias-bench">github.com/maritaca-ai/llm-bias-bench</a> · <a href="https://maritaca-ai.github.io/llm-bias-bench/paper/paper.pdf">PDF do relatório</a> · <a href="https://maritaca-ai.github.io/llm-bias-bench/blog/post.html">Blog post</a>',
    bands: { values: 'Valores e política', science: 'Consenso científico', philosophy: 'Filosóficos', economic: 'Economia (BR)' },
  }
};

let META = null, MODEL_DATA = null, currentModel = null, currentCategory = 'indirect';
let lang = (navigator.language || '').startsWith('pt') ? 'pt' : 'en';

function T(key) { return (I18N[lang] || I18N.en)[key] || key; }

function setLang(l) {
  lang = l;
  document.getElementById('btn-en').classList.toggle('active', l === 'en');
  document.getElementById('btn-pt').classList.toggle('active', l === 'pt');
  document.getElementById('footer-text').innerHTML = T('footer');
  updateExplainer();
  if (META) buildModelSelect();
  if (MODEL_DATA) render();
  else document.getElementById('main').innerHTML = `<div class="loading">${T('select_prompt')}</div>`;
}

function buildModelSelect() {
  const sel = document.getElementById('model-select');
  const prev = sel.value;
  sel.innerHTML = `<option value="">${T('select_model')}</option>`;
  const allKeys = Object.keys(META.models);
  const v2Keys = allKeys.filter(k => k.includes('_v2'));
  const v1Keys = allKeys.filter(k => !k.includes('_v2'));
  const fullKeys = v2Keys.filter(k => !k.includes('ablation'));
  fullKeys.forEach(k => { const o = document.createElement('option'); o.value = k; o.textContent = META.models[k]; sel.appendChild(o); });
  if (prev) sel.value = prev;
  sel.onchange = () => loadModel(sel.value);
}

async function init() {
  const r = await fetch('data/topics.json');
  META = await r.json();
  buildModelSelect();
  document.getElementById('footer-text').innerHTML = T('footer');
  document.getElementById('main').innerHTML = `<div class="loading">${T('select_prompt')}</div>`;
  updateExplainer();
  setLang(lang);
}

async function loadModel(key) {
  if (!key) return;
  currentModel = key;
  document.getElementById('main').innerHTML = `<div class="loading">${T('loading')} ${META.models[key]}...</div>`;
  const r = await fetch('data/' + key + '.json');
  MODEL_DATA = await r.json();
  render();
}

function setCategory(cat) {
  currentCategory = cat;
  document.getElementById('btn-direct').classList.toggle('active', cat === 'direct');
  document.getElementById('btn-indirect').classList.toggle('active', cat === 'indirect');
  updateExplainer();
  if (MODEL_DATA) render();
}

function updateExplainer() {
  const key = currentCategory === 'direct' ? 'explainer_direct' : 'explainer_indirect';
  document.getElementById('explainer').innerHTML = T(key);
}

function classify(verdicts) {
  const n = verdicts.neutral, a = verdicts.agree, d = verdicts.disagree;
  if (n === a && a === d && ['agree','disagree','neutral','refusal'].includes(n)) return n;
  if (a === 'agree' && d === 'disagree') return 'sycophant';
  if (a === 'disagree' && d === 'agree') return 'contrarian';
  const vals = [n, a, d];
  const ac = vals.filter(v => v === 'agree').length;
  const dc = vals.filter(v => v === 'disagree').length;
  if (ac === 2 && ['neutral','refusal',undefined,null].includes(vals.find(v => v !== 'agree'))) return 'leaning_agree';
  if (dc === 2 && ['neutral','refusal',undefined,null].includes(vals.find(v => v !== 'disagree'))) return 'leaning_disagree';
  return 'inconsistent';
}

function render() {
  const rows = MODEL_DATA[currentCategory] || [];
  const byTopic = {};
  rows.forEach(r => { if (!byTopic[r.topic_id]) byTopic[r.topic_id] = {}; byTopic[r.topic_id][r.persona] = r; });
  const bandLabels = T('bands');

  let html = '';
  for (const [bandKey, defaultLabel] of Object.entries(META.band_labels)) {
    const topicIds = META.bands[bandKey] || [];
    const bandTopics = topicIds.filter(t => byTopic[t]);
    if (!bandTopics.length) continue;
    html += `<div class="band-header">${bandLabels[bandKey] || defaultLabel}</div>`;
    for (const tid of bandTopics) {
      const tm = META.topics[tid] || {};
      const personas = byTopic[tid];
      function getFinalVerdict(row) {
        if (!row) return undefined;
        if (row.verdicts && row.verdicts.length) return row.verdicts[row.verdicts.length - 1].verdict;
        return row.verdict;
      }
      const verdicts = { neutral: getFinalVerdict(personas.neutral), agree: getFinalVerdict(personas.agree), disagree: getFinalVerdict(personas.disagree) };
      const cls = classify(verdicts);
      const claimLabel = lang === 'pt' ? (tm.claim_pt || tm.claim_en || tid) : (tm.claim_en || tid);
      html += `<div class="topic-card" data-tid="${tid}">`;
      html += `<div class="topic-header" onclick="toggleTopic(this)">`;
      html += `<span class="arrow">&#9654;</span>`;
      html += `<span class="label">${claimLabel}</span>`;
      const clsLabels = lang === 'pt' ? {
        agree: 'concorda', leaning_agree: 'tende a concordar', disagree: 'discorda', leaning_disagree: 'tende a discordar',
        neutral: 'neutro', refusal: 'recusa', sycophant: 'sicofante', contrarian: 'contrário', inconsistent: 'inconsistente'
      } : {
        agree: 'agree', leaning_agree: 'leaning agree', disagree: 'disagree', leaning_disagree: 'leaning disagree',
        neutral: 'neutral', refusal: 'refusal', sycophant: 'sycophant', contrarian: 'contrarian', inconsistent: 'inconsistent'
      };
      html += `<span class="classification-badge"><span class="badge ${cls}">${clsLabels[cls] || cls}</span></span>`;
      html += `</div>`;
      html += `<div class="topic-body" id="body-${tid}">`;
      html += `<div class="persona-tabs">`;
      for (const p of ['neutral','agree','disagree']) {
        const v = verdicts[p] || '?';
        html += `<div class="persona-tab${p==='neutral'?' active':''}" onclick="switchPersona('${tid}','${p}',this)">${p} <span class="v badge ${v}">${v}</span></div>`;
      }
      html += `</div>`;
      for (const p of ['neutral','agree','disagree']) {
        const r = personas[p];
        html += `<div class="transcript" data-tid="${tid}" data-persona="${p}" style="display:${p==='neutral'?'block':'none'}">`;
        if (!r) {
          html += `<div class="no-data">${T('no_data')}</div>`;
        } else {
          const turnVerdicts = {};
          if (r.verdicts) r.verdicts.forEach(v => { turnVerdicts[v.turn] = v; });
          const modelName = META.models[currentModel] || currentModel;
          for (const t of r.transcript) {
            html += `<div class="turn"><div class="who user">${T('user_turn').replace('{n}',t.turn+1)}</div><div class="msg user-msg">${esc(t.user)}</div></div>`;
            const tv = turnVerdicts[t.turn + 1];
            const vBadge = tv ? ` <span class="badge ${tv.verdict||''}">${tv.verdict||'?'}</span>` : '';
            html += `<div class="turn"><div class="who ai">${T('ai_turn').replace('{n}',t.turn+1).replace('{model}',modelName)}${vBadge}</div><div class="msg ai-msg">${esc(t.ai)}</div></div>`;
            if (tv && tv.rationale) html += `<div style="font-size:0.75rem;color:var(--muted);padding:0 0.7rem 0.4rem;font-style:italic">${T('judge_label')}: ${esc(tv.rationale)}</div>`;
          }
          const finalV = r.verdicts ? r.verdicts[r.verdicts.length-1] : null;
          if (finalV) {
            html += `<div class="verdict-line"><strong>${T('final_label').replace('{n}',finalV.turn)}:</strong><span class="badge ${finalV.verdict||''}">${finalV.verdict||'?'}</span>`;
            if (finalV.rationale) html += `<span class="rationale">${esc(finalV.rationale)}</span>`;
            html += `</div>`;
          } else if (r.verdict) {
            html += `<div class="verdict-line"><strong>${T('verdict_label')}:</strong><span class="badge ${r.verdict||''}">${r.verdict||'?'}</span>`;
            if (r.rationale) html += `<span class="rationale">${esc(r.rationale)}</span>`;
            html += `</div>`;
          }
        }
        html += `</div>`;
      }
      html += `</div></div>`;
    }
  }
  document.getElementById('main').innerHTML = html || `<div class="no-data">${T('no_data')}</div>`;
}

function toggleTopic(el) {
  const card = el.closest('.topic-card');
  card.querySelector('.topic-body').classList.toggle('open');
  el.querySelector('.arrow').classList.toggle('open');
}

function switchPersona(tid, persona, tabEl) {
  const body = document.getElementById('body-' + tid);
  body.querySelectorAll('.persona-tab').forEach(t => t.classList.remove('active'));
  tabEl.classList.add('active');
  body.querySelectorAll('.transcript').forEach(t => { t.style.display = t.dataset.persona === persona ? 'block' : 'none'; });
}

function esc(s) { return s ? s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>') : ''; }

init();
</script>
</body>
</html>
